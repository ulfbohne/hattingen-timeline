<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approval History – Unicorn Park Hattingen / Satkom</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #f7f5f0; color: #1a1a2e; min-height: 100vh; }
  header { background: #1a1a2e; color: #f7f5f0; padding: 40px 60px 32px; border-bottom: 4px solid #c8a96e; }
  header h1 { font-size: 28px; font-weight: normal; letter-spacing: 0.05em; text-transform: uppercase; color: #c8a96e; margin-bottom: 8px; }
  header p { font-size: 14px; color: #aaa; font-family: Arial, sans-serif; }
  .toolbar { background: #fff; border-bottom: 1px solid #ddd; padding: 14px 60px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .toolbar label { font-size: 12px; font-family: Arial, sans-serif; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
  .filter-btn { padding: 6px 14px; border: 1px solid #ddd; background: #fff; border-radius: 20px; font-size: 12px; font-family: Arial, sans-serif; cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover { border-color: #c8a96e; color: #c8a96e; }
  .filter-btn.active { background: #1a1a2e; color: #c8a96e; border-color: #1a1a2e; }
  .add-btn { margin-left: auto; padding: 8px 20px; background: #c8a96e; color: #1a1a2e; border: none; border-radius: 4px; font-size: 13px; font-family: Arial, sans-serif; font-weight: bold; cursor: pointer; }
  .timeline-wrap { max-width: 900px; margin: 0 auto; padding: 50px 40px; position: relative; }
  .timeline-line { position: absolute; left: 109px; top: 50px; bottom: 50px; width: 2px; background: linear-gradient(to bottom, #c8a96e, #1a1a2e); opacity: 0.3; }
  .entry { display: flex; gap: 0; margin-bottom: 36px; position: relative; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .entry-year { width: 90px; flex-shrink: 0; text-align: right; padding-right: 20px; padding-top: 14px; font-size: 13px; font-family: Arial, sans-serif; color: #999; font-weight: bold; }
  .entry-dot { width: 20px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding-top: 16px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 2px #c8a96e; flex-shrink: 0; z-index: 1; }
  .dot.approval { box-shadow: 0 0 0 2px #27ae60; background: #27ae60; }
  .dot.rejection { box-shadow: 0 0 0 2px #c0392b; background: #c0392b; }
  .dot.contract { box-shadow: 0 0 0 2px #2980b9; background: #2980b9; }
  .dot.problem { box-shadow: 0 0 0 2px #e67e22; background: #e67e22; }
  .dot.open { box-shadow: 0 0 0 2px #c8a96e; background: #fff; }
  .entry-card { flex: 1; margin-left: 20px; background: #fff; border-radius: 6px; border: 1px solid #e8e4dc; border-left: 4px solid #c8a96e; padding: 16px 20px; transition: box-shadow 0.2s; }
  .entry-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .entry-card.approval { border-left-color: #27ae60; }
  .entry-card.rejection { border-left-color: #c0392b; }
  .entry-card.contract { border-left-color: #2980b9; }
  .entry-card.problem { border-left-color: #e67e22; }
  .entry-card.open { border-left-color: #c8a96e; border-style: dashed; background: #fdfcf8; }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .card-title { font-size: 15px; font-weight: bold; color: #1a1a2e; flex: 1; }
  .card-tag { font-size: 10px; font-family: Arial, sans-serif; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 10px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; }
  .tag-approval { background: #e8f8f0; color: #27ae60; }
  .tag-rejection { background: #fdeaea; color: #c0392b; }
  .tag-contract { background: #eaf3fb; color: #2980b9; }
  .tag-problem { background: #fef3e8; color: #e67e22; }
  .tag-open { background: #fdf8ee; color: #c8a96e; }
  .card-text { font-size: 13.5px; line-height: 1.65; color: #444; font-family: Arial, sans-serif; }
  .card-note { margin-top: 10px; padding: 8px 12px; background: #fdf8ee; border-left: 3px solid #c8a96e; font-size: 12px; color: #666; font-family: Arial, sans-serif; font-style: italic; }
  .card-note.red { background: #fdeaea; border-left-color: #c0392b; color: #c0392b; font-style: normal; font-weight: bold; }
  .card-actions { margin-top: 12px; display: flex; gap: 8px; }
  .btn-small { padding: 4px 12px; font-size: 11px; font-family: Arial, sans-serif; border: 1px solid #ddd; background: #fff; border-radius: 4px; cursor: pointer; color: #666; transition: all 0.2s; }
  .btn-small:hover { border-color: #1a1a2e; color: #1a1a2e; }
  .btn-small.danger:hover { border-color: #c0392b; color: #c0392b; }
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 8px; padding: 32px; width: 560px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal h2 { font-size: 18px; color: #1a1a2e; margin-bottom: 20px; font-weight: normal; border-bottom: 2px solid #c8a96e; padding-bottom: 12px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-family: Arial, sans-serif; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; font-family: Arial, sans-serif; color: #1a1a2e; }
  .form-group textarea { height: 80px; resize: vertical; }
  .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
  .btn-primary { padding: 10px 24px; background: #1a1a2e; color: #c8a96e; border: none; border-radius: 4px; font-size: 14px; font-family: Arial, sans-serif; cursor: pointer; }
  .btn-cancel { padding: 10px 20px; background: #fff; color: #666; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; font-family: Arial, sans-serif; cursor: pointer; }
  .legend { display: flex; gap: 16px; padding: 16px 60px; background: #fff; border-top: 1px solid #eee; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: Arial, sans-serif; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .empty-state { text-align: center; padding: 60px; color: #999; font-family: Arial, sans-serif; font-size: 14px; }
</style>
</head>
<body>
<header>
  <h1>Approval History · Unicorn Park Hattingen / Satkom</h1>
  <p>Ruhrallee 19, 45525 Hattingen · Interactive Project Chronology · As of June 2026</p>
</header>
<div class="toolbar">
  <label>Filter:</label>
  <button class="filter-btn active" onclick="filterEntries('all', this)">All</button>
  <button class="filter-btn" onclick="filterEntries('approval', this)">Approvals</button>
  <button class="filter-btn" onclick="filterEntries('rejection', this)">Rejections</button>
  <button class="filter-btn" onclick="filterEntries('contract', this)">Contracts</button>
  <button class="filter-btn" onclick="filterEntries('problem', this)">Problems</button>
  <button class="filter-btn" onclick="filterEntries('open', this)">Open / Pending</button>
  <button class="add-btn" onclick="openModal()">+ Add entry</button>
</div>
<div class="timeline-wrap">
  <div class="timeline-line"></div>
  <div id="timeline"></div>
</div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div> Approval granted</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div> Rejection / Revocation</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2980b9"></div> Contract / Agreement</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div> Problem / Violation</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fff; border: 2px solid #c8a96e"></div> Open / Pending</div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add new entry</h2>
    <div class="form-group"><label>Year / Date</label><input type="text" id="inputYear" placeholder="e.g. 2024 or 15.03.2024"></div>
    <div class="form-group"><label>Title</label><input type="text" id="inputTitle" placeholder="Brief description of the event"></div>
    <div class="form-group"><label>Category</label>
      <select id="inputCategory">
        <option value="approval">Approval granted</option>
        <option value="rejection">Rejection / Revocation</option>
        <option value="contract">Contract / Agreement</option>
        <option value="problem">Problem / Violation</option>
        <option value="open">Open / Pending</option>
      </select>
    </div>
    <div class="form-group"><label>Details</label><textarea id="inputText" placeholder="Description, reference numbers, parties involved..."></textarea></div>
    <div class="form-group"><label>Strategic note (internal)</label><input type="text" id="inputNote" placeholder="Internal assessment or open question"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>
<script>
const initialData = [
  { year: "2001", title: "Building permit – Restaurant, max. 400 persons", category: "approval", text: "Ref. 906-00 · Use approved exclusively as a restaurant with a maximum capacity of 400 persons. Event use was not part of this permit.", note: "Foundation of all subsequent usage questions. This permit defines the approved condition." },
  { year: "2009 / 2010", title: "Fire safety concept Rassek & Partner + new permit", category: "approval", text: "BSK dated 25.11.2009 by Rassek & Partner incorporated into new building permit 2010. Use continues as 'restaurant' on 1st floor.", note: "BSK and drawings must be obtained – archive access required." },
  { year: "2018", title: "City inspection – violations noted", category: "problem", text: "Official inspection confirms 400-person cap. Found: no separation between units, escape routes running through neighbouring units → violations recorded.", note: "⚠ Structural problems were already known in 2018. Why was no action taken?" },
  { year: "2020 / 2021", title: "Change-of-use application Veziroglu – REJECTED", category: "rejection", text: "Previous tenant Veziroglu applies to change use from restaurant/canteen to 'event gastronomy'. City of Hattingen rejects on 17.03.2021. Event use was never approved.", note: "⚠ CRITICAL: This rejection was known – yet the lease with Bleichroth was signed guaranteeing event approval." },
  { year: "01.10.2022", title: "Lease agreement AB Event (Bleichroth) – Space lease No. 43 + Equipment No. 03", category: "contract", text: "Two contracts: space lease No. 43 (Satkom) + equipment lease No. 03 (CREAM). Contract warrants approval for event use up to 400 persons – although this approval never existed.", noteRed: "⚠ LEGAL RISK: Rickes warranted a non-existent permit. This is the main basis for Bleichroth's damage claims." },
  { year: "2022 / 2023", title: "Construction works without coordination – usage permit revoked", category: "problem", text: "Bleichroth begins conversion works without coordination with authority or owner. Existing usage permit consequently revoked. Fire safety requirements imposed.", note: "Which specific requirements were imposed? Check documents in Dropbox." },
  { year: "2022 – ongoing", title: "Legal dispute Satkom/CREAM vs. Bleichroth", category: "problem", text: "Lengthy legal dispute over contractual disagreements. Bleichroth claims damages based on the false permit warranty in the lease.", note: "Current status of proceedings? Lawyer involved?" },
  { year: "2024", title: "ReStart project – Bleichroth as general contractor", category: "contract", text: "New construction project 'ReStart' developed with Bleichroth as GC. Fire safety concept IDN Rev. 1 – September 2024. Bleichroth submits GC prices – market conformity questionable.", note: "Prices must be verified by independent assessment. Who initiated the GC appointment?" },
  { year: "Jan 2025", title: "BSK IDN Revision 2 + replacement page 76", category: "approval", text: "Revised fire safety concept IDN Rev. 2 dated 13.01.2025. Replacement page 76 dated 14.02.2025. Forms part of the subsequent building permit.", note: "Document not yet fully available – to be requested from authority." },
  { year: "28.02.2025", title: "Building permit granted for event area – Ref. (63) 01073-23-59", category: "approval", text: "City of Hattingen grants permit for change of use 'Unicorn Park Hattingen'. Numerous deviations from standard approved – compensated by full-coverage fire detection system DIN 14675. Valid 3 years.", note: "Permit expires Feb. 2028 if construction has not begun. Construction start must be notified 1 week in advance." },
  { year: "2025 – ongoing", title: "Negotiation of new lease + investment allocation", category: "open", text: "Goal: new lease where Bleichroth covers all event-related investments. Negotiations stalled due to Bleichroth's above-market GC prices.", note: "Next step: independent cost allocation – event-related vs. non-event-related." },
  { year: "Open", title: "Complete building application + BSK 11.12.2023 still missing", category: "open", text: "Building application, building description and first BSK version dated 11.12.2023 not yet obtained. Without these documents, no complete cost allocation is possible.", note: "Archive access at Hattingen building authority required – power of attorney being prepared." },
  { year: "Open", title: "Plans and intentions of Bleichroth for Rothberg unit", category: "open", text: "Bleichroth plans additional entrance + WCs in the Rothberg unit as access to the event area. Concrete plans requested – pending.", note: "⚠ Any modification requires supplementary approval (Tektur). WCs = new sanitary installations = subject to approval." }
];
let entries = [...initialData];
let editIndex = null;
let currentFilter = 'all';
function tagLabel(cat) {
  const map = { approval: 'Approval', rejection: 'Rejection', contract: 'Contract', problem: 'Problem', open: 'Open' };
  return map[cat] || cat;
}
function renderTimeline() {
  const container = document.getElementById('timeline');
  const filtered = currentFilter === 'all' ? entries : entries.filter(e => e.category === currentFilter);
  if (filtered.length === 0) { container.innerHTML = '<div class="empty-state">No entries for this filter.</div>'; return; }
  container.innerHTML = filtered.map((e) => {
    const realIndex = entries.indexOf(e);
    return `<div class="entry" data-category="${e.category}">
      <div class="entry-year">${e.year}</div>
      <div class="entry-dot"><div class="dot ${e.category}"></div></div>
      <div class="entry-card ${e.category}">
        <div class="card-header"><div class="card-title">${e.title}</div><span class="card-tag tag-${e.category}">${tagLabel(e.category)}</span></div>
        <div class="card-text">${e.text}</div>
        ${e.noteRed ? `<div class="card-note red">${e.noteRed}</div>` : ''}
        ${e.note && !e.noteRed ? `<div class="card-note">${e.note}</div>` : ''}
        <div class="card-actions">
          <button class="btn-small" onclick="editEntry(${realIndex})">✏ Edit</button>
          <button class="btn-small danger" onclick="deleteEntry(${realIndex})">✕ Delete</button>
        </div>
      </div></div>`;
  }).join('');
}
function filterEntries(cat, btn) { currentFilter = cat; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderTimeline(); }
function openModal(index = null) {
  editIndex = index;
  document.getElementById('modalTitle').textContent = index !== null ? 'Edit entry' : 'Add new entry';
  if (index !== null) { const e = entries[index]; document.getElementById('inputYear').value = e.year; document.getElementById('inputTitle').value = e.title; document.getElementById('inputCategory').value = e.category; document.getElementById('inputText').value = e.text; document.getElementById('inputNote').value = e.note || ''; }
  else { document.getElementById('inputYear').value = ''; document.getElementById('inputTitle').value = ''; document.getElementById('inputCategory').value = 'approval'; document.getElementById('inputText').value = ''; document.getElementById('inputNote').value = ''; }
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); editIndex = null; }
function saveEntry() {
  const year = document.getElementById('inputYear').value.trim();
  const title = document.getElementById('inputTitle').value.trim();
  const category = document.getElementById('inputCategory').value;
  const text = document.getElementById('inputText').value.trim();
  const note = document.getElementById('inputNote').value.trim();
  if (!year || !title) { alert('Please fill in year and title.'); return; }
  const entry = { year, title, category, text, note };
  if (editIndex !== null) { entries[editIndex] = entry; } else { entries.push(entry); }
  closeModal(); renderTimeline();
}
function editEntry(index) { openModal(index); }
function deleteEntry(index) { if (confirm('Delete entry?')) { entries.splice(index, 1); renderTimeline(); } }
document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
renderTimeline();
</script>
</body>
</html>
