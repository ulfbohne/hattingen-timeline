<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline – Unicorn Park Hattingen / Satkom</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Georgia', serif;
    background: #f7f5f0;
    color: #1a1a2e;
    min-height: 100vh;
  }

  header {
    background: #1a1a2e;
    color: #f7f5f0;
    padding: 40px 60px 32px;
    border-bottom: 4px solid #c8a96e;
  }

  header h1 {
    font-size: 28px;
    font-weight: normal;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #c8a96e;
    margin-bottom: 8px;
  }

  header p {
    font-size: 14px;
    color: #aaa;
    font-family: Arial, sans-serif;
  }

  .toolbar {
    background: #fff;
    border-bottom: 1px solid #ddd;
    padding: 14px 60px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .toolbar label {
    font-size: 12px;
    font-family: Arial, sans-serif;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .filter-btn {
    padding: 6px 14px;
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 20px;
    font-size: 12px;
    font-family: Arial, sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: #c8a96e; color: #c8a96e; }
  .filter-btn.active { background: #1a1a2e; color: #c8a96e; border-color: #1a1a2e; }

  .add-btn {
    margin-left: auto;
    padding: 8px 20px;
    background: #c8a96e;
    color: #1a1a2e;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-family: Arial, sans-serif;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }
  .add-btn:hover { background: #b8993e; }

  .timeline-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 50px 40px;
    position: relative;
  }

  .timeline-line {
    position: absolute;
    left: 109px;
    top: 50px;
    bottom: 50px;
    width: 2px;
    background: linear-gradient(to bottom, #c8a96e, #1a1a2e);
    opacity: 0.3;
  }

  .entry {
    display: flex;
    gap: 0;
    margin-bottom: 36px;
    position: relative;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .entry-year {
    width: 90px;
    flex-shrink: 0;
    text-align: right;
    padding-right: 20px;
    padding-top: 14px;
    font-size: 13px;
    font-family: Arial, sans-serif;
    color: #999;
    font-weight: bold;
  }

  .entry-dot {
    width: 20px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 16px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 0 0 2px #c8a96e;
    flex-shrink: 0;
    z-index: 1;
  }

  .dot.genehmigung { box-shadow: 0 0 0 2px #27ae60; background: #27ae60; }
  .dot.ablehnung { box-shadow: 0 0 0 2px #c0392b; background: #c0392b; }
  .dot.vertrag { box-shadow: 0 0 0 2px #2980b9; background: #2980b9; }
  .dot.problem { box-shadow: 0 0 0 2px #e67e22; background: #e67e22; }
  .dot.offen { box-shadow: 0 0 0 2px #c8a96e; background: #fff; }

  .entry-card {
    flex: 1;
    margin-left: 20px;
    background: #fff;
    border-radius: 6px;
    border: 1px solid #e8e4dc;
    border-left: 4px solid #c8a96e;
    padding: 16px 20px;
    position: relative;
    transition: box-shadow 0.2s;
  }

  .entry-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .entry-card.genehmigung { border-left-color: #27ae60; }
  .entry-card.ablehnung { border-left-color: #c0392b; }
  .entry-card.vertrag { border-left-color: #2980b9; }
  .entry-card.problem { border-left-color: #e67e22; }
  .entry-card.offen { border-left-color: #c8a96e; border-style: dashed; background: #fdfcf8; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }

  .card-title {
    font-size: 15px;
    font-weight: bold;
    color: #1a1a2e;
    flex: 1;
  }

  .card-tag {
    font-size: 10px;
    font-family: Arial, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tag-genehmigung { background: #e8f8f0; color: #27ae60; }
  .tag-ablehnung { background: #fdeaea; color: #c0392b; }
  .tag-vertrag { background: #eaf3fb; color: #2980b9; }
  .tag-problem { background: #fef3e8; color: #e67e22; }
  .tag-offen { background: #fdf8ee; color: #c8a96e; }

  .card-text {
    font-size: 13.5px;
    line-height: 1.65;
    color: #444;
    font-family: Arial, sans-serif;
  }

  .card-note {
    margin-top: 10px;
    padding: 8px 12px;
    background: #fdf8ee;
    border-left: 3px solid #c8a96e;
    font-size: 12px;
    color: #666;
    font-family: Arial, sans-serif;
    font-style: italic;
  }

  .card-note.red { background: #fdeaea; border-left-color: #c0392b; color: #c0392b; font-style: normal; font-weight: bold; }

  .card-actions {
    margin-top: 12px;
    display: flex;
    gap: 8px;
  }

  .btn-small {
    padding: 4px 12px;
    font-size: 11px;
    font-family: Arial, sans-serif;
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 4px;
    cursor: pointer;
    color: #666;
    transition: all 0.2s;
  }
  .btn-small:hover { border-color: #1a1a2e; color: #1a1a2e; }
  .btn-small.danger:hover { border-color: #c0392b; color: #c0392b; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: #fff;
    border-radius: 8px;
    padding: 32px;
    width: 560px;
    max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }

  .modal h2 {
    font-size: 18px;
    color: #1a1a2e;
    margin-bottom: 20px;
    font-weight: normal;
    border-bottom: 2px solid #c8a96e;
    padding-bottom: 12px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-family: Arial, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #666;
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
    font-family: Arial, sans-serif;
    color: #1a1a2e;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    outline: none;
    border-color: #c8a96e;
  }

  .form-group textarea { height: 80px; resize: vertical; }

  .modal-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn-primary {
    padding: 10px 24px;
    background: #1a1a2e;
    color: #c8a96e;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-family: Arial, sans-serif;
    cursor: pointer;
  }
  .btn-primary:hover { background: #2a2a4e; }

  .btn-cancel {
    padding: 10px 20px;
    background: #fff;
    color: #666;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
    font-family: Arial, sans-serif;
    cursor: pointer;
  }

  .legend {
    display: flex;
    gap: 16px;
    padding: 16px 60px;
    background: #fff;
    border-top: 1px solid #eee;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: Arial, sans-serif;
    color: #666;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .hidden { display: none !important; }

  .empty-state {
    text-align: center;
    padding: 60px;
    color: #999;
    font-family: Arial, sans-serif;
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <h1>Genehmigungshistorie · Unicorn Park Hattingen / Satkom</h1>
  <p>Ruhrallee 19, 45525 Hattingen · Interaktive Projektchronik · Stand: Juni 2026</p>
</header>

<div class="toolbar">
  <label>Filter:</label>
  <button class="filter-btn active" onclick="filterEntries('all', this)">Alle</button>
  <button class="filter-btn" onclick="filterEntries('genehmigung', this)">Genehmigungen</button>
  <button class="filter-btn" onclick="filterEntries('ablehnung', this)">Ablehnungen</button>
  <button class="filter-btn" onclick="filterEntries('vertrag', this)">Verträge</button>
  <button class="filter-btn" onclick="filterEntries('problem', this)">Probleme</button>
  <button class="filter-btn" onclick="filterEntries('offen', this)">Offen / Ausstehend</button>
  <button class="add-btn" onclick="openModal()">+ Eintrag hinzufügen</button>
</div>

<div class="timeline-wrap">
  <div class="timeline-line"></div>
  <div id="timeline"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div> Genehmigung erteilt</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div> Ablehnung / Entzug</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2980b9"></div> Vertrag / Vereinbarung</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div> Problem / Verstoß</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fff; border: 2px solid #c8a96e"></div> Offen / Ausstehend</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Neuen Eintrag hinzufügen</h2>
    <div class="form-group">
      <label>Jahr / Datum</label>
      <input type="text" id="inputYear" placeholder="z.B. 2024 oder 15.03.2024">
    </div>
    <div class="form-group">
      <label>Titel</label>
      <input type="text" id="inputTitle" placeholder="Kurze Beschreibung des Ereignisses">
    </div>
    <div class="form-group">
      <label>Kategorie</label>
      <select id="inputCategory">
        <option value="genehmigung">Genehmigung erteilt</option>
        <option value="ablehnung">Ablehnung / Entzug</option>
        <option value="vertrag">Vertrag / Vereinbarung</option>
        <option value="problem">Problem / Verstoß</option>
        <option value="offen">Offen / Ausstehend</option>
      </select>
    </div>
    <div class="form-group">
      <label>Details</label>
      <textarea id="inputText" placeholder="Beschreibung, Aktenzeichen, Beteiligte..."></textarea>
    </div>
    <div class="form-group">
      <label>Strategische Anmerkung (intern)</label>
      <input type="text" id="inputNote" placeholder="Interne Einschätzung oder offene Frage">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-primary" onclick="saveEntry()">Speichern</button>
    </div>
  </div>
</div>

<script>
const initialData = [
  {
    year: "2001",
    title: "Baugenehmigung – Restaurant, max. 400 Personen",
    category: "genehmigung",
    text: "Az. 906-00 · Nutzung genehmigt ausschließlich als Restaurant mit einer maximalen Kapazität von 400 Personen. Eventnutzung nicht Bestandteil der Genehmigung.",
    note: "Grundlage aller späteren Nutzungsfragen. Diese Genehmigung definiert den genehmigten Zustand."
  },
  {
    year: "2009 / 2010",
    title: "Brandschutzkonzept Rassek & Partner + neue Genehmigung",
    category: "genehmigung",
    text: "BSK vom 25.11.2009 von Rassek & Partner in neue Baugenehmigung 2010 aufgenommen. Nutzung weiterhin 'Restaurant' im 1. Obergeschoss.",
    note: "BSK und Pläne müssen beschafft werden – Akteneinsicht erforderlich."
  },
  {
    year: "2018",
    title: "Städtische Inspektion – Mängel festgestellt",
    category: "problem",
    text: "Behördliche Besichtigung bestätigt 400-Personen-Obergrenze. Festgestellt: keine Trennung zwischen den Einheiten, Rettungswege führen durch benachbarte Einheiten → Verstöße protokolliert.",
    note: "⚠ Bereits 2018 waren die strukturellen Probleme bekannt. Warum wurde nicht reagiert?"
  },
  {
    year: "2020 / 2021",
    title: "Nutzungsänderungsantrag Veziroglu – ABGELEHNT",
    category: "ablehnung",
    text: "Vormieter Veziroglu beantragt Nutzungsänderung von Restaurant/Kantine zu 'Eventgastronomie'. Stadt Hattingen lehnt ab am 17.03.2021. Eventnutzung wurde nie genehmigt.",
    note: "⚠ KRITISCH: Diese Ablehnung war bekannt – dennoch wurde der Mietvertrag mit Bleichroth mit der Zusicherung einer Eventgenehmigung abgeschlossen."
  },
  {
    year: "01.10.2022",
    title: "Mietvertrag AB Event (Bleichroth) – Raummiete Nr. 43 + Geräte Nr. 03",
    category: "vertrag",
    text: "Zwei Verträge: Raummietvertrag Nr. 43 (Satkom) + Gerätemiete Nr. 03 (CREAM). Im Vertrag wird eine Genehmigung für Eventbetrieb mit bis zu 400 Personen zugesichert – obwohl diese Genehmigung nie erteilt wurde.",
    noteRed: "⚠ RECHTLICHES RISIKO: Rickes hat eine nicht existierende Genehmigung zugesichert. Dies ist der Haupthebel für Bleicroths Schadensersatzforderungen."
  },
  {
    year: "2022 / 2023",
    title: "Umbauarbeiten ohne Koordination – Nutzungserlaubnis entzogen",
    category: "problem",
    text: "Bleichroth beginnt Umbauarbeiten ohne Abstimmung mit Behörde oder Eigentümer. Bestehende Nutzungserlaubnis wird infolgedessen entzogen. Brandschutzauflagen werden verhängt.",
    note: "Welche konkreten Auflagen wurden verhängt? Dokumente aus Dropbox prüfen."
  },
  {
    year: "2022 – laufend",
    title: "Rechtstreit Satkom/CREAM vs. Bleichroth",
    category: "problem",
    text: "Langwieriger Rechtsstreit wegen Vertragsstreitigkeiten. Bleichroth macht Schadensersatzansprüche geltend auf Basis der falschen Genehmigungszusicherung im Mietvertrag.",
    note: "Aktueller Stand des Verfahrens? Anwalt involviert?"
  },
  {
    year: "2024",
    title: "ReStart-Projekt – Bleichroth als Generalunternehmer",
    category: "vertrag",
    text: "Neues Bauprojekt 'ReStart' entwickelt mit Bleichroth als GU. Brandschutzkonzept IDN Rev. 1 – September 2024. Bleichroth bietet Preise als GU an – Marktkonformität fraglich.",
    note: "Preise müssen durch unabhängige Kalkulation geprüft werden. Wer hat die GU-Beauftragung initiiert?"
  },
  {
    year: "Jan 2025",
    title: "BSK IDN Revision 2 + Austauschseite 76",
    category: "genehmigung",
    text: "Überarbeitetes Brandschutzkonzept IDN Rev. 2 vom 13.01.2025. Austauschseite 76 vom 14.02.2025. Bestandteil der späteren Baugenehmigung.",
    note: "Dokument liegt noch nicht vollständig vor – bei Behörde anfordern."
  },
  {
    year: "28.02.2025",
    title: "Baugenehmigung Eventfläche erteilt – Az. (63) 01073-23-59",
    category: "genehmigung",
    text: "Stadt Hattingen erteilt Genehmigung für Nutzungsänderung 'Unicorn Park Hattingen'. Zahlreiche Abweichungen vom Regelwerk genehmigt – kompensiert durch flächendeckende Brandmeldeanlage DIN 14675. Gültigkeit: 3 Jahre.",
    note: "Genehmigung läuft ab Feb. 2028 wenn nicht begonnen wird. Baubeginn muss 1 Woche vorher angezeigt werden."
  },
  {
    year: "2025 – laufend",
    title: "Verhandlung neuer Mietvertrag + Investitionsaufteilung",
    category: "offen",
    text: "Ziel: Neuer Mietvertrag wo Bleichroth alle eventbedingten Investitionen trägt. Verhandlung stockt wegen überhöhter GU-Preise von Bleichroth.",
    note: "Nächster Schritt: Kostenaufteilung eventbedingt vs. nicht eventbedingt durch unabhängigen Sachverständigen."
  },
  {
    year: "Offen",
    title: "Vollständiger Bauantrag + BSK 11.12.2023 fehlen noch",
    category: "offen",
    text: "Bauantrag, Baubeschreibung und erste BSK-Version vom 11.12.2023 noch nicht beschafft. Ohne diese Unterlagen keine vollständige Kostenaufteilung möglich.",
    note: "Akteneinsicht beim Bauarchiv Hattingen erforderlich – Vollmacht wird vorbereitet."
  },
  {
    year: "Offen",
    title: "Pläne und Absichten Bleichroth für Rothberg-Einheit",
    category: "offen",
    text: "Bleichroth plant zusätzlichen Eingang + WCs in der Rothberg-Einheit als Zugang zur Eventfläche. Konkrete Pläne angefordert – ausstehend.",
    note: "⚠ Jede Änderung erfordert Tekturgenehmigung. WCs = neue Sanitärinstallationen = genehmigungspflichtig."
  }
];

let entries = [...initialData];
let editIndex = null;
let currentFilter = 'all';

function tagLabel(cat) {
  const map = {
    genehmigung: 'Genehmigung',
    ablehnung: 'Ablehnung',
    vertrag: 'Vertrag',
    problem: 'Problem',
    offen: 'Offen'
  };
  return map[cat] || cat;
}

function renderTimeline() {
  const container = document.getElementById('timeline');
  const filtered = currentFilter === 'all'
    ? entries
    : entries.filter(e => e.category === currentFilter);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">Keine Einträge für diesen Filter.</div>';
    return;
  }

  container.innerHTML = filtered.map((e, i) => {
    const realIndex = entries.indexOf(e);
    return `
    <div class="entry" data-category="${e.category}">
      <div class="entry-year">${e.year}</div>
      <div class="entry-dot"><div class="dot ${e.category}"></div></div>
      <div class="entry-card ${e.category}">
        <div class="card-header">
          <div class="card-title">${e.title}</div>
          <span class="card-tag tag-${e.category}">${tagLabel(e.category)}</span>
        </div>
        <div class="card-text">${e.text}</div>
        ${e.noteRed ? `<div class="card-note red">${e.noteRed}</div>` : ''}
        ${e.note && !e.noteRed ? `<div class="card-note">${e.note}</div>` : ''}
        <div class="card-actions">
          <button class="btn-small" onclick="editEntry(${realIndex})">✏ Bearbeiten</button>
          <button class="btn-small danger" onclick="deleteEntry(${realIndex})">✕ Löschen</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterEntries(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTimeline();
}

function openModal(index = null) {
  editIndex = index;
  document.getElementById('modalTitle').textContent = index !== null ? 'Eintrag bearbeiten' : 'Neuen Eintrag hinzufügen';
  if (index !== null) {
    const e = entries[index];
    document.getElementById('inputYear').value = e.year;
    document.getElementById('inputTitle').value = e.title;
    document.getElementById('inputCategory').value = e.category;
    document.getElementById('inputText').value = e.text;
    document.getElementById('inputNote').value = e.note || '';
  } else {
    document.getElementById('inputYear').value = '';
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputCategory').value = 'genehmigung';
    document.getElementById('inputText').value = '';
    document.getElementById('inputNote').value = '';
  }
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  editIndex = null;
}

function saveEntry() {
  const year = document.getElementById('inputYear').value.trim();
  const title = document.getElementById('inputTitle').value.trim();
  const category = document.getElementById('inputCategory').value;
  const text = document.getElementById('inputText').value.trim();
  const note = document.getElementById('inputNote').value.trim();

  if (!year || !title) { alert('Bitte Jahr und Titel ausfüllen.'); return; }

  const entry = { year, title, category, text, note };

  if (editIndex !== null) {
    entries[editIndex] = entry;
  } else {
    entries.push(entry);
  }

  closeModal();
  renderTimeline();
}

function editEntry(index) { openModal(index); }

function deleteEntry(index) {
  if (confirm('Eintrag löschen?')) {
    entries.splice(index, 1);
    renderTimeline();
  }
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

renderTimeline();
</script>
</body>
</html>
